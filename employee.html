<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير المهام — نظم وحلول</title>
<style>
body{margin:0;background:#0b0d14;color:#e4e6f2;font-family:'IBM Plex Sans Arabic',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
.spin{width:36px;height:36px;border:3px solid #262840;border-top-color:#4f6ef7;border-radius:50%;animation:s .7s linear infinite;}
@keyframes s{to{transform:rotate(360deg)}}
p{font-size:14px;color:#4e5370;}
</style>
</head>
<body>
<div class="spin"></div>
<p>جاري تحميل صفحة الموظف...</p>
</body>
</html>
